# Extra review instructions added to prompts for this repo.
# Expanded per #145: OpenAI token budget is not the constraint —
# the review prompt should cover a wide range of correctness, statistical,
# security, Quarto, test, and dependency failure modes per commit.
review_guidelines = """R package (llm) — global config management project.

SEVERITY OVERRIDE: The base prompt format says High/Medium/Low but this project
uses Critical/High/Medium/Low. Use Critical when genuinely warranted — do not
collapse critical issues into High. Valid severity values: Critical, High, Medium,
Low. Info severity is not used in this project — upgrade to Low or omit entirely.

CONTEXT:
- Diffs are structural (difftastic/tree-sitter) — pure formatting changes
  are invisible. Focus on semantic changes only.
- AGENTS.md must stay under 200 lines; rule files under 150.
- All rule .md files need YAML frontmatter (--- block, name +
  description + type at minimum).
- Hook scripts must be portable bash (no `grep -oP`, no `sed -i ''`,
  no `stat -f` — see `nix-shell-portability` memory).
- Project lives inside a nix shell; never `install.packages()`,
  `devtools::install()`, or `pak::pkg_install()`.

CORRECTNESS & DATA INTEGRITY:
- Filter inversions (`!=` vs `==`, `>` vs `>=`, off-by-one indices).
- Implicit joins / missing `by =` argument (silent Cartesian product).
- Type coercion that silently drops rows: `suppressWarnings(as.integer(x))`
  is BANNED per `suppress-warnings-antipattern` rule. Use readr
  col_types or explicit coerce-with-tracking helpers.
- `NA` propagation in rolling stats: `RcppRoll::roll_mean(x, n=63)`
  returns NA for any window with any NA. See `na-propagation-rolling-stats`
  rule — use `roll_mean_safe()` with `min_frac` gate.
- Look-ahead bias in time series: `zoo::na.approx` uses tomorrow's
  value — BANNED for backtest features.
- Date vs POSIXct join-key type mismatches silently produce 0 matches
  with no warning (see `data-validation-timeseries` §9). Defensive
  `as.Date()` on both sides of any cross-series join.
- Hardcoded values that should be computed dynamically: any numeric or
  date in prose/captions/tables that could go stale must be inline R
  (`r expr`) or `paste0()` (see `dynamic-prose-values` rule).
- Missing units / scale (percentage stored as 0–1 mixed with 0–100).
- Off-by-one in window functions, `lag`/`lead`, `slice(-1)` vs `slice(1)`.

STATISTICAL REPORTING (per `statistical-reporting` rule):
- p-values reported WITHOUT effect size + CI + sample n.
- The word "significant" anywhere in prose/captions/commit messages —
  BANNED. Replace with p + FPR + effect-size CI.
- Multiple comparisons without `p.adjust()` correction.
- p-values quoted to more than 3 decimal places.
- Exploratory findings presented as confirmatory without disclosure.
- Reporting any p-value without the matching False Positive Risk (FPR)
  at equipoise prior — Colquhoun 2019.

SECURITY / SCOPE:
- Credentials in committed code (`password = "..."`, `api_key = "..."`,
  `sk-...`, `ghp_...`). Should be `Sys.getenv("DB_PASSWORD")`.
- Compound bash commands (`cd && git ...` — banned, use `git -C dir`).
- Destructive ops without confirmation: `rm -rf` on protected paths
  (`R/`, `data/`, `inst/extdata/`, `_targets/`, `knowledge/`).
- Raw SQL strings where `duckplyr` would do (per `qa-targets-pipeline`).

QUARTO / VISUALISATION:
- Hardcoded values in vignette prose, captions, table headers.
- Missing `fig-alt` on any figure.
- `value_box()` / pie chart / bar chart usage — BANNED. Use Cleveland
  dotplots or compact two-column tables (see `visualization-standards`).
- Unrendered markdown leaking into output (`^####\\s`, raw `*term*`).
- Captions shorter than 3 sentences without units + source + dynamic values.

TESTS / PIPELINE:
- New exported function without a `testthat::test_that()` test.
- Tests using mocks where integration is required (e.g., mocked DB
  where production hits real DuckDB — past incident).
- `tar_make()` called inside `R/` function (anti-pattern, untestable).
- `tar_load()` inside a `tar_target` body — hidden dependency, breaks
  static analysis.
- Missing snapshot test on Shiny module output.
- `_targets.R` containing inline `tar_target()` calls (must live in
  `R/tar_plans/plan_*.R`).

DEPENDENCIES & ENVIRONMENT:
- New package used in code but not added to `DESCRIPTION` (Imports
  or Suggests).
- New Python package used but not in `default.R` `py_pkgs`.
- System dep used but not in `default.R`/`default.nix`.
- `install.packages()` / `pak::pkg_install()` / `devtools::install()`
  anywhere — BANNED in nix.

CRITICAL SEVERITY EXAMPLES (flag at Critical, not High — use Critical for these):
- Any committed credential: api key, password, token, private key, `sk-...`, `ghp_...`.
- Broken authentication or auth bypass (missing auth check, anyone can call admin endpoint).
- SQL injection via raw string interpolation (f-string or paste0 in SQL query).
- Production data loss: destructive ops (`rm -rf`, DROP TABLE, DELETE) on non-tmp
  paths without confirmation code / recovery trail.
- Look-ahead bias in any feature used by a production or backtest model.
- Reverting an `na-propagation-rolling-stats` fix without explicit explanation.
- Adding `value_box()`, pie chart, or stacked bar AFTER the visualization-standards
  rule was established (regression of a named anti-pattern).
- `install.packages()` / `pak::pkg_install()` / `devtools::install()` in any file
  that runs inside the Nix shell (will brick the reproducible environment).
"""

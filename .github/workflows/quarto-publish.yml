name: Quarto Publish

on:
  push:
    branches: [main]
    paths:
      - 'index.qmd'
      - 'vignettes/**'
      - 'inst/extdata/**'
      - 'inst/qmd/**'
      - '_quarto.yml'
      - '_includes/**'
      - 'R/**'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pkgload
            any::dplyr
            any::tidyr
            any::ggplot2
            any::gt
            any::gtExtras
            any::scales
            any::lubridate
            any::here
            any::knitr
            any::DT
            any::jsonlite
            any::gh
            any::htmltools

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        run: |
          Rscript -e 'pkgload::load_all(quiet = TRUE)'
          quarto render

      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

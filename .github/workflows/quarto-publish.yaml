# Build and deploy Quarto website to GitHub Pages
# Uses r-lib/actions (Native R) - NOT Nix - per CI skill Decision Matrix

name: Quarto Publish

on:
  push:
    branches: [main]
    paths:
      - 'vignettes/**'
      - '_quarto.yml'
      - 'index.qmd'
      - 'R/ccusage.R'
      - 'inst/extdata/ccusage_*.json'
      - '.github/workflows/quarto-publish.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::gh
            any::dplyr
            any::tidyr
            any::ggplot2
            any::lubridate
            any::knitr
            any::gert
            any::fs
            any::gt
            any::gtExtras
            any::scales
            any::here
            any::jsonlite
            any::DT
            any::htmltools
            any::tibble
            any::purrr
            any::rmarkdown
            any::targets
            any::checkmate
            any::cli
            any::DBI
            any::duckdb
            any::withr
            any::gridExtra

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Install local package
        run: R CMD INSTALL .

      - name: Render Quarto site
        run: |
          # Show R paths for debugging
          Rscript -e "cat('Library paths:', paste(.libPaths(), collapse = ', '), '\n')"
          Rscript -e "cat('gh available:', requireNamespace('gh', quietly = TRUE), '\n')"
          quarto render

      - name: Validate rendered HTML
        run: |
          echo "=== Checking for [MISSING EVIDENCE] ==="
          missing=$(grep -rl "MISSING EVIDENCE" docs/articles/*.html 2>/dev/null | wc -l | tr -d ' ')
          if [ "$missing" -gt 0 ]; then
            echo "FAIL: $missing articles contain [MISSING EVIDENCE]"
            grep -l "MISSING EVIDENCE" docs/articles/*.html
            exit 1
          fi
          echo "OK: 0 [MISSING EVIDENCE]"

          echo "=== Checking for NULL outputs ==="
          null_count=$(grep -cE '#&gt; NULL|class="gt_sourcenote">NULL' docs/articles/*.html 2>/dev/null | awk -F: '{s+=$2}END{print s+0}')
          if [ "$null_count" -gt 0 ]; then
            echo "WARN: $null_count NULL outputs found in rendered HTML"
            grep -lE '#&gt; NULL|class="gt_sourcenote">NULL' docs/articles/*.html
          else
            echo "OK: 0 NULLs"
          fi

          echo "=== Checking internal links ==="
          broken=0
          for html in docs/articles/*.html; do
            slug=$(basename "$html")
            # Extract href="*.html" links (internal only)
            grep -oE 'href="[^"]*\.html[^"]*"' "$html" 2>/dev/null | \
              sed 's/href="//;s/"//' | \
              grep -v '^http' | \
              while read -r link; do
                target="docs/articles/$link"
                # Handle relative paths
                if [ ! -f "$target" ] && [ ! -f "docs/$link" ]; then
                  echo "BROKEN: $slug -> $link"
                  broken=$((broken + 1))
                fi
              done
          done
          echo "Link check complete"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# quarto-frontmatter.yaml — minimal YAML snippet for a Quarto document
# that uses the mermaid-dashboard pattern. Merge into your existing
# qmd YAML.
#
# The KEY line is `include-after-body: - diagrams-loader.html`. That's
# what gets the inlined module script onto the page. Without it the
# mount divs stay empty.

---
title: "Your Dashboard"
format:
  html:
    embed-resources: true        # inline CSS/images (mermaid lib comes from CDN
                                 # at runtime, so embed-resources is OK)
    page-layout: full
    toc: false
    theme: cosmo                 # or whatever theme you use
    css: custom.scss
    include-after-body:
      - "diagrams-loader.html"   # ← this loads the inlined mermaid module
execute:
  echo: false
  warning: false
  message: false
---

project:
  type: website
  output-dir: docs
  render:
    - "index.qmd"
    - "vignettes/*.qmd"
    - "vignettes/telemetry/*.qmd"
    - "vignettes/config-evolution/*.qmd"
    - "vignettes/knowledge-evolution/*.qmd"
    - "vignettes/articles/*.qmd"
    - "vignettes/articles/llm-assisted-tips/*.qmd"
  post-render:
    # Fail the render if any internal link 404s (JohnGavin/llm#715).
    - .claude/scripts/quarto_post_render_links.sh
    # Fail the render on dark-mode contrast violations (dark-mode-completeness rule).
    # Repo-relative so CI can spawn it (the absolute path doesn't exist on the
    # runner); the wrapper's internal check script is $HOME-absolute and skips
    # gracefully in CI, while still enforcing locally.
    - .claude/scripts/quarto_post_render_contrast.sh

website:
  title: "LLM Project"
  image: assets/logo.svg
  open-graph: true
  twitter-card:
    card-style: summary
  navbar:
    background: dark
    left:
      - href: index.qmd
        text: Home
      - text: Dashboards
        menu:
          - href: vignettes/config-evolution/index.qmd
            text: Config Evolution
          - href: vignettes/knowledge-evolution/index.qmd
            text: Knowledge Base
          - href: vignettes/closeread-infrastructure.qmd
            text: Infrastructure
          - href: vignettes/articles/closeread-config.qmd
            text: Config Stack
          - href: https://johngavin.github.io/llmtelemetry/
            text: Telemetry
            target: _blank
      - href: vignettes/articles/llm-assisted-tips/index.qmd
        text: LLM-assisted Tips
      - text: Roborev
        menu:
          - href: vignettes/articles/roborev-architecture.qmd
            text: Architecture

format:
  html:
    theme: cosmo
    brand: _brand.yml
    toc: true
    include-in-header:
      - _includes/toolbar.html